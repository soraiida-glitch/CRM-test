name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: salesforce-ai-service
  REGION: asia-northeast1
  IMAGE: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/salesforce-ai/salesforce-ai-service

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      API_SECRET_TOKEN: test-token
      OPENAI_API_KEY: sk-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev
      - run: docker build -t $IMAGE .
      - run: docker push $IMAGE
      - run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --service-account=${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT_EMAIL }} \
            --set-env-vars="ENVIRONMENT=production,GCP_PROJECT_ID=${PROJECT_ID},SALESFORCE_DOMAIN=login,OPENAI_API_KEY_SECRET_NAME=OPENAI_API_KEY,API_SECRET_TOKEN_SECRET_NAME=API_SECRET_TOKEN,SALESFORCE_USERNAME_SECRET_NAME=SALESFORCE_USERNAME,SALESFORCE_PASSWORD_SECRET_NAME=SALESFORCE_PASSWORD,SALESFORCE_SECURITY_TOKEN_SECRET_NAME=SALESFORCE_SECURITY_TOKEN"
